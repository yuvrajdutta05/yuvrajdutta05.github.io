ongoing:

  - year: 2026 
  
    title: "(Master's Dissertation) Asymptotic Fluctuations in Cubic Interaction Spin Models"
    supervisor: "Prof. Sumit Mukherjee (Columbia University)"
    description: >
      Derived concentration inequalities for linear functionals in cubic interaction spin models,
      including edge-triangle ERGMs using exchangeable-pair methods and Glauber dynamics.
      Currently investigating central limit theorems for global magnetization under broad
      structural assumptions on the interaction tensor.

  - year: 2026
    title: "Conditional Limit Theorem for Brownian Motion with Drift under Restricted L²-Norm"
    supervisor: "Prof. Frank Aurzada (TU Darmstadt)"
    description: >
      Studying Brownian motion with drift conditioned to have atypically small L² norm over 
      long time horizons and investigating associated conditional limit theorem along with
       the asymptotics of small deviation probabilities of corresponding quadratic functionals.


completed:

  - year: 2025
    title: "Projection-Based Filtering and Smoothing of Diffusion Processes"
    authors: "Yannick Eich, Yuvraj Dutta, Heinz Koeppl"
    description: >
      Developed a variational framework for approximate Bayesian filtering and smoothing of diffusion processes based on projection principles. The approach extends classical assumed-density methods beyond standard Gaussian approximations, allowing tractable inference under more general distributional constraints while preserving closed-form parameter dynamics for broad classes of stochastic systems.
 
  - year: 2024
    title: "Bivariate Inverse Gaussian Degradation Processes with Shared Random Effects and an Application to Fatigue Cracks"
    authors: "Yuvraj Dutta, Sandip Barui, Debanjan Mitra, Narayanaswamy Balakrishnan"
    description: >
      Developed a new class of bivariate degradation models based on inverse Gaussian processes coupled through latent shared effects. By introducing a substantially more flexible dependence structure than existing formulations, the framework unifies several commonly used models as special cases and enables data-driven selection of dependence mechanisms within a broad parametric family.
    link: "https://arxiv.org/pdf/2606.04546"
    link_text: "[arXiv]"

