short_bio: >-
short_bio: >-
  <p>
  I am a final-year M.Stat. student at the
  <a href="https://www.isical.ac.in/" target="_blank">Indian Statistical Institute, Kolkata</a>,
  specializing in Probability. My master's dissertation, supervised by
  <a href="https://sites.stat.columbia.edu/sumitm/" target="_blank">Prof. Sumit Mukherjee</a>
  (Columbia University), focuses on asymptotic fluctuations in cubic interaction spin models.
  I am also working with
  <a href="https://www2.mathematik.tu-darmstadt.de/~aurzada/" target="_blank">Prof. Frank Aurzada</a>
  (TU Darmstadt)
  on conditional limit theorems for Brownian motion with drift under pathwise norm constraints.
  </p>

  <p>
  I had the opportunity to undertake a research internship with the
  <a href="https://www.mathematik.tu-darmstadt.de/stochastik/startseite_agsto/index.de.jsp" target="_blank">Probability Group</a>
  in the Department of Mathematics at TU Darmstadt
  (on-site, Summer 2026), under the supervision of Dr. Frank Aurzada.
  Previously, I visited the
  <a href="https://www.bcs.tu-darmstadt.de/welcome/index.en.jsp" target="_blank">Self-Organizing Systems Lab</a>
  at TU Darmstadt (on-site, Summer 2025), where I worked on approximate Bayesian filtering and smoothing for stochastic differential equations.
  </p>




portrait_url: /assets/images/photos/image.png


research_interests: My research interests lie broadly in probability theory and theoretical statistics. I am particularly interested in stochastic processes, probabilistic modeling, and the behavior of complex random systems. I am also interested in statistical inference for dynamic and latent-variable models, as well as Bayesian approaches to modeling uncertainty. 



