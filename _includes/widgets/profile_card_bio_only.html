<div class="mt-3 d-md-none"></div>

<div class="row">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">

            <div class="card-body p-0">

                <h4 class="p-3 mb-0 border-bottom border-gray">
                    About Me
                </h4>

                <div class="px-4 py-3">

                    <div class="text-profile-bio"
                         {% if site.data.profile.short_bio_text_justify %}
                         style="text-align: justify;"
                         {% endif %}>
                        {{ site.data.profile.short_bio }}
                    </div>

                    {% if site.data.profile.cv_link %}
                    <div class="mt-2">
                        <a target="_blank"
                           href="{{ site.data.profile.cv_link | relative_url }}">
                            <i class="fas fa-file-alt"></i> Curriculum Vitae
                        </a>
                    </div>
                    {% endif %}

                </div>

            </div>

        </div>
    </div>
</div>
