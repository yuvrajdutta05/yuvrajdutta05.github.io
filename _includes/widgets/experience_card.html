<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
        <div class="card-body p-0">

            <h4 class="p-3 mb-0 border-bottom border-gray">
                Education
            </h4>

            <div class="px-4 py-3">

                {% if site.data.profile.education %}
                <ul class="list-unstyled mb-0">

                    {% for item in site.data.profile.education %}
                    <li class="media mb-4">

                        <img src="{{ item.logo | relative_url }}"
                             alt="{{ item.name }}"
                             style="width: 32px;"
                             class="mr-3 mt-1">

                        <div class="media-body">

                            <div class="d-flex align-items-start">

                                <div style="font-size:1.05rem; font-weight:600;">
                                    {{ item.name }}
                                </div>

                                <div class="ml-auto no-break text-muted"
                                     style="font-size:0.85rem;">
                                    <em>{{ item.date }}</em>
                                </div>

                            </div>

                            <div class="mt-1">
                                {{ item.position }}
                            </div>

                        </div>

                    </li>
                    {% endfor %}

                </ul>
                {% endif %}

            </div>

        </div>

    </div>
</div>
</div>
